name: CI

on:
  push:
    branches: [main, develop]

  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0

        env:
          MYSQL_DATABASE: sipeip_test
          MYSQL_ROOT_PASSWORD: password

        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, mbstring, xml, curl, zip
          coverage: none

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependencias de Composer
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Preparar la aplicación
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Instalar dependencias de Node
        run: npm ci

      - name: Compilar assets
        run: npm run build

      - name: Ejecutar migraciones
        run: php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: sipeip_test
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Ejecutar pruebas
        run: php artisan test
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: sipeip_test
          DB_USERNAME: root
          DB_PASSWORD: password